[package]
name = "inkhaven"
version = "1.0.0"
edition = "2024"
# Rust 1.85 stabilised edition 2024. Bump alongside any toolchain-only
# feature usage (let-else / chained-comparisons / etc. are already stable).
rust-version = "1.85"
license = "Apache-2.0"
description = "Inkhaven — TUI literary work editor for Typst books, backed by bdslib"
authors = ["Vladimir Ulogov <vulogov@gmail.com>"]
repository = "https://github.com/vulogov/blackInkhaven"
homepage = "https://github.com/vulogov/blackInkhaven"
documentation = "https://github.com/vulogov/blackInkhaven/tree/main/Documentation"
readme = "README.md"
keywords = ["tui", "editor", "typst", "writing", "ai"]
categories = ["command-line-utilities", "text-editors", "text-processing"]

# Files shipped in the published `.crate` tarball. Whitelist rather than
# blacklist so a stray `db/`, `backup/`, or `target/` directory can never
# leak. `assets/` is required at build time because `config.rs` reads the
# default HJSON via `include_str!`. `vendor/` carries the bdslib +
# tree-sitter-typst sources (see workspace block below) and must travel
# with the package.
include = [
    "src/**/*.rs",
    "assets/**",
    "vendor/bdslib/**",
    "vendor/tree-sitter-typst/**",
    "Cargo.toml",
    "Cargo.lock",
    "README.md",
    "LICENSE",
    "Documentation/**/*.md",
]

[[bin]]
name = "inkhaven"
path = "src/main.rs"

[dependencies]
# Storage / search. Vendored at `vendor/bdslib/` (cloned from
# github.com/vulogov/bdslib). The `path` is used by local builds and
# `cargo package`; the `version` is what crates.io would resolve against
# if/when bdslib is published. See the publishing note further down.
bdslib = { path = "vendor/bdslib", version = "0.12" }

# CLI
clap = { version = "4", features = ["derive", "wrap_help"] }

# Config (HJSON requirement)
serde-hjson = "1.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async runtime (required by bdslib + genai)
tokio = { version = "1", features = [
  "macros",
  "rt-multi-thread",
  "fs",
  "io-util",
  "signal",
  "sync",
  "time",
] }
tokio-stream = "0.1"
futures-util = "0.3"

# TUI — pinned to ratatui 0.29 because tui-textarea 0.7 hasn't bumped to 0.30 yet
ratatui = "0.29"
crossterm = "0.28"
tui-textarea = { version = "0.7", default-features = false, features = [
  "crossterm",
  "ratatui",
  "search",
] }

# Syntax highlighting. Pinned to 0.20 because uben0/tree-sitter-typst's
# Cargo.toml is locked at `tree-sitter ~0.20.10` and the Language type is
# ABI-incompatible across major versions. Bump when the grammar moves.
tree-sitter = "0.20"
tree-sitter-highlight = "0.20"
# Vendored at `vendor/tree-sitter-typst/` (cloned from
# github.com/uben0/tree-sitter-typst). The `path` is used by local
# builds and `cargo package`; the `version` mirrors the upstream
# Cargo.toml. See the publishing note further down.
tree-sitter-typst = { path = "vendor/tree-sitter-typst", version = "0.0.1" }

# AI clients (one crate covers Gemini, DeepSeek, OpenAI, Anthropic, …)
genai = "=0.6.0-beta.20"

# Misc
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
directories = "6"
uuid = { version = "1", features = ["v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
arboard = "3"
slug = "0.1"
walkdir = "2"
regex = "1"
# Snowball stemmers (English, Russian, and 17 other languages). Used by the
# editor's Place/Character highlight overlay so a paragraph named
# "Москва" lights up "Москве", "Москвою", etc.
rust-stemmers = "1.2"
unicode-segmentation = "1"
# Markdown parsing for the AI pane's rendered output, plus the
# markdown→Typst translator that runs when the user applies an AI result to
# a paragraph via r/i/t/b.
pulldown-cmark = { version = "0.13", default-features = false }
# Zip backup / restore commands and the TUI auto-backup-on-exit path.
zip = { version = "2", default-features = false, features = ["deflate"] }
# Human-friendly duration parsing for the auto-backup `max_age` config knob.
humantime = "2"
humantime-serde = "1"

[dev-dependencies]
tempfile = "3"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"

# Exclude the vendored crates from any ambient workspace discovery — the
# parent repository contains them only as source for our path deps, not
# as workspace members. Without this, Cargo would try to build / lint
# them on every `cargo` invocation, and `cargo publish` would refuse
# because of nested manifests in the published tarball.
[workspace]
members = ["."]
exclude = ["vendor/bdslib", "vendor/tree-sitter-typst"]

# Publishing note ---------------------------------------------------------
#
# `cargo package` / `cargo publish` strip the `path` from `bdslib` and
# `tree-sitter-typst` and leave only the `version`. crates.io then
# expects to resolve those versions from the registry, so the actual
# publish step **still requires the two crates to exist on crates.io**:
#
#   1. Publish `bdslib` to crates.io at version 0.12.x.
#   2. Publish `tree-sitter-typst` (or a fork under a new name) at the
#      version pinned above.
#   3. Then `cargo publish -p inkhaven` works straight from this manifest.
#
# Until that happens, vendoring is purely for build self-containment:
# `cargo build` / `cargo test` work offline against the vendored copies,
# and the source tree no longer carries git URLs in dependency specs.
