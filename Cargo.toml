[package]
name = "inkhaven"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"
description = "Inkhaven — TUI literary work editor for Typst books, backed by bdslib"
authors = ["Vladimir Ulogov <vulogov@gmail.com>"]
repository = "https://github.com/vulogov/blackInkhaven"

[[bin]]
name = "inkhaven"
path = "src/main.rs"

[dependencies]
# Storage / search (Vladimir's own crate — not on crates.io)
bdslib = { git = "https://github.com/vulogov/bdslib", branch = "main" }

# CLI
clap = { version = "4", features = ["derive", "wrap_help"] }

# Config (HJSON requirement)
serde-hjson = "1.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async runtime (required by bdslib + genai)
tokio = { version = "1", features = ["macros", "rt-multi-thread", "fs", "io-util", "signal", "sync", "time"] }
tokio-stream = "0.1"
futures-util = "0.3"

# TUI — pinned to ratatui 0.29 because tui-textarea 0.7 hasn't bumped to 0.30 yet
ratatui = "0.29"
crossterm = "0.28"
tui-textarea = { version = "0.7", default-features = false, features = ["crossterm", "ratatui", "search"] }

# Syntax highlighting. Pinned to 0.20 because uben0/tree-sitter-typst's
# Cargo.toml is locked at `tree-sitter ~0.20.10` and the Language type is
# ABI-incompatible across major versions. Bump when the grammar moves.
tree-sitter = "0.20"
tree-sitter-highlight = "0.20"
tree-sitter-typst = { git = "https://github.com/uben0/tree-sitter-typst", branch = "master" }

# AI clients (one crate covers Gemini, DeepSeek, OpenAI, Anthropic, …)
genai = "=0.6.0-beta.20"

# Misc
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
directories = "6"
uuid = { version = "1", features = ["v7", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
arboard = "3"
slug = "0.1"
walkdir = "2"
regex = "1"
# Snowball stemmers (English, Russian, and 17 other languages). Used by the
# editor's Place/Character highlight overlay so a paragraph named
# "Москва" lights up "Москве", "Москвою", etc.
rust-stemmers = "1.2"
unicode-segmentation = "1"

[dev-dependencies]
tempfile = "3"

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
