<form id="script-form"
      hx-post="/scripts/save"
      hx-target="#script-editor"
      hx-swap="innerHTML"
      class="flex flex-col h-full"
      style="height: 100%;">

  <input type="hidden" name="id" value="{{ id }}">

  <!-- Metadata fields -->
  <div class="editor-meta-row">
    <input type="text" name="name" value="{{ name }}"
           placeholder="Script name (required)"
           class="flex-1 rounded text-sm" required>
    <input type="text" name="schedule" value="{{ schedule }}"
           placeholder="Crontab schedule, e.g. */5 * * * *"
           class="flex-1 rounded font-mono text-sm" required>
  </div>

  <!-- Editor -->
  <div class="editor-cm-wrap">
    <div id="cm-host"></div>
    <textarea id="script-body" name="script" style="display:none">{{ body }}</textarea>
  </div>

  <!-- Toolbar (Run + Save + Delete + flash) -->
  <div class="editor-toolbar">
    {% if !is_new %}
    <button type="button"
            class="btn text-xs"
            style="background: #3a1212; color: #fca5a5; border: 1px solid #5b1a1a;"
            hx-delete="/scripts/{{ id }}"
            hx-target="#script-editor"
            hx-swap="innerHTML"
            hx-confirm="Delete this script?">
      Delete
    </button>
    {% endif %}

    <div class="flex-1"></div>

    {% if has_flash %}
    <span class="flash">{{ flash }}</span>
    {% endif %}

    <span class="text-xs text-slate-600">
      {% if is_new %}Creating new script{% else %}Editing — id: <code class="text-slate-400">{{ id }}</code>{% endif %}
    </span>

    <!-- Run: overrides the form's hx-post to /scripts/run and targets the
         results pane instead of swapping the editor itself. -->
    <button type="submit"
            class="btn text-xs flex items-center gap-1.5"
            style="background: #14352a; color: #86efac; border: 1px solid #1f5b3d;"
            hx-post="/scripts/run"
            hx-target="#run-results"
            hx-swap="innerHTML"
            hx-indicator="#run-spinner">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="currentColor" viewBox="0 0 24 24">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
      Run
    </button>

    <button type="submit" class="btn btn-primary text-xs flex items-center gap-1.5">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24"
           stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M5 13l4 4L19 7"/>
      </svg>
      Save
    </button>
  </div>
</form>
