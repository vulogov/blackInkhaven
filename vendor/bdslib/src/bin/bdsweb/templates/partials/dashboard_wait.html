<div hx-get="{{ poll_url }}"
     hx-trigger="every 2s"
     hx-target="#dashboard-data"
     hx-swap="innerHTML"
     class="flex flex-col items-center justify-center py-32 gap-5 text-slate-500">
  <svg class="animate-spin h-10 w-10 text-blue-500"
       xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
    <circle class="opacity-25" cx="12" cy="12" r="10"
            stroke="currentColor" stroke-width="4"></circle>
    <path class="opacity-75" fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
  </svg>
  <p class="text-base font-medium text-slate-300">Wait…</p>
  <p class="text-xs text-slate-600">{{ message }}</p>
</div>
