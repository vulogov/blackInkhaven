{% extends "base.html" %}
{% block title %}Dashboard · bdsnode{% endblock %}
{% block nav_dashboard %}active{% endblock %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
/* ── BUND-runtime stats (formerly on /bund) ─────────────────────────────── */
.bund-stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.75rem;
  margin-bottom: 0.75rem;
}
@media (max-width: 720px) {
  .bund-stats-grid { grid-template-columns: repeat(2, 1fr); }
}
.bund-stat {
  background: #0f1320;
  border: 1px solid #1e2535;
  border-radius: 0.5rem;
  padding: 0.65rem 0.85rem;
}
.bund-stat-label { font-size: 0.68rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; }
.bund-stat-value { font-size: 1.4rem; font-weight: 600; color: #e2e8f0; line-height: 1.2; margin-top: 0.15rem; }
.bund-stat-hint  { font-size: 0.7rem; color: #475569; margin-top: 0.1rem; }

.bund-status-tables {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-top: 0.75rem;
}
@media (max-width: 900px) {
  .bund-status-tables { grid-template-columns: 1fr; }
}
.bund-status-card {
  background: #0f1320;
  border: 1px solid #1e2535;
  border-radius: 0.5rem;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.bund-status-card-header {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.55rem 0.75rem;
  border-bottom: 1px solid #1e2535;
  font-size: 0.74rem;
  color: #cbd5e1;
  font-weight: 500;
}
.bund-status-table { width: 100%; border-collapse: collapse; }
.bund-status-table th {
  padding: 0.4rem 0.6rem;
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #64748b;
  border-bottom: 1px solid #1e2535;
  text-align: left;
}
.bund-status-table td {
  padding: 0.45rem 0.6rem;
  font-size: 0.78rem;
  border-bottom: 1px solid #131927;
  color: #cbd5e1;
}
.bund-status-table tr:last-child td { border-bottom: none; }
.bund-status-table .num    { font-family: ui-monospace, monospace; color: #94a3b8; }
.bund-status-table .ts     { font-family: ui-monospace, monospace; font-size: 0.72rem; color: #94a3b8; }
.bund-status-table .text-right { text-align: right; }
.bund-status-table .job-id {
  font-family: 'JetBrains Mono','Fira Code','Menlo',monospace;
  font-size: 0.72rem;
  color: #93c5fd;
}
.worker-badge {
  display: inline-block;
  padding: 0.1rem 0.45rem;
  background: rgba(34,197,94,0.12);
  color: #86efac;
  border: 1px solid rgba(34,197,94,0.32);
  border-radius: 0.3rem;
  font-family: ui-monospace, monospace;
  font-size: 0.72rem;
}
.bund-status-empty {
  padding: 1.1rem 0.75rem;
  text-align: center;
  font-size: 0.74rem;
  color: #64748b;
  font-style: italic;
}
</style>
{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-xl font-semibold text-slate-200">Dashboard</h1>
  <button id="dashboard-reload"
          type="button"
          class="btn btn-primary"
          hx-get="/dashboard/refresh"
          hx-target="#dashboard-data"
          hx-swap="innerHTML"
          hx-disabled-elt="this">
    Reload
  </button>
</div>

<div id="dashboard-data"
     hx-get="/dashboard/data"
     hx-trigger="load, every {{ refresh_secs }}s"
     hx-swap="innerHTML">
  <!-- Initial placeholder until /dashboard/data responds -->
  <div class="flex flex-col items-center justify-center py-32 gap-5 text-slate-500">
    <svg class="animate-spin h-10 w-10 text-blue-500"
         xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10"
              stroke="currentColor" stroke-width="4"></circle>
      <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
    </svg>
    <p class="text-base font-medium text-slate-300">Wait…</p>
    <p class="text-xs text-slate-600">Loading cached snapshot</p>
  </div>
</div>

<script>
  // Show a "Wait" placeholder in #dashboard-data the moment the Reload button
  // is clicked, so the user gets immediate feedback while the live RPCs run.
  (function () {
    var btn = document.getElementById('dashboard-reload');
    if (!btn) return;
    btn.addEventListener('htmx:beforeRequest', function () {
      var target = document.getElementById('dashboard-data');
      if (!target) return;
      target.innerHTML =
        '<div class="flex flex-col items-center justify-center py-32 gap-5 text-slate-500">' +
        '<svg class="animate-spin h-10 w-10 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">' +
        '<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>' +
        '<path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>' +
        '</svg>' +
        '<p class="text-base font-medium text-slate-300">Wait…</p>' +
        '<p class="text-xs text-slate-600">Live refresh in progress</p>' +
        '</div>';
    });
  })();
</script>
{% endblock %}
